<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Updated | MerseyVoice</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'branding/merseyvoice-favicon.svg' %}">
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 24px; background: #f0f2f7; color: #0f1624; }
    .card { max-width: 520px; margin: 0 auto; background: #fff; border: 1px solid #e4e7ef; border-radius: 14px; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #3d4760; margin: 0 0 16px; line-height: 1.6; }
    a { display: inline-flex; align-items: center; height: 40px; padding: 0 14px; border-radius: 10px; text-decoration: none; border: 1px solid #e4e7ef; color: #3d4760; background: #fff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Password updated</h1>
    <p>Your password was changed successfully.</p>
    <a href="{% url 'home' %}">Return to dashboard</a>
  </main>
</body>
</html>
