<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password | MerseyVoice</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'branding/merseyvoice-favicon.svg' %}">
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 24px; background: #f0f2f7; color: #0f1624; }
    .card { max-width: 520px; margin: 0 auto; background: #fff; border: 1px solid #e4e7ef; border-radius: 14px; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #7480a0; margin: 0 0 16px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 14px; color: #3d4760; }
    input { width: 100%; height: 40px; border: 1px solid #e4e7ef; border-radius: 10px; padding: 0 12px; font: inherit; }
    ul.errorlist { list-style: none; margin: 8px 0 0; padding: 8px 10px; border-radius: 8px; background: #ffe4e6; color: #9f1239; font-size: 13px; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    button, .link-btn { height: 40px; border-radius: 10px; font: inherit; padding: 0 14px; text-decoration: none; display: inline-flex; align-items: center; }
    button { border: none; background: #3b5bdb; color: #fff; font-weight: 700; cursor: pointer; }
    .link-btn { border: 1px solid #e4e7ef; background: #fff; color: #3d4760; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Change password</h1>
    <p>Use this after first login or whenever you need to rotate credentials.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label for="id_old_password">Current password</label>
      {{ form.old_password }}
      <label for="id_new_password1">New password</label>
      {{ form.new_password1 }}
      <label for="id_new_password2">Confirm new password</label>
      {{ form.new_password2 }}
      <div class="actions">
        <button type="submit">Update password</button>
        <a class="link-btn" href="{% url 'home' %}">Back to dashboard</a>
      </div>
    </form>
  </main>
</body>
</html>
